<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #0a58ca, #00d4ff); /* আপনার থিম কালার */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            animation: zoomIn 1.5s ease;
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        .app-name {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Loading Animation */
        .loader {
            margin-top: 30px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes zoomIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="profile.png" alt="App Logo">
        <div class="app-name">My App</div>
    </div>

    <div class="loader"></div>

    <script>
        // ১. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCzv08ydHYvUue_sgEjDoT221ocAedXYfM",
            authDomain: "myproject-9f21b.firebaseapp.com",
            projectId: "myproject-9f21b",
            storageBucket: "myproject-9f21b.firebasestorage.app",
            messagingSenderId: "670760388595",
            appId: "1:670760388595:web:a88159aa1ef33a4da37486"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ২. ৩ সেকেন্ড পর পেজ পরিবর্তন করার লজিক
        setTimeout(() => {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // যদি ইউজার লগইন থাকে তবে হোমে যাবে
                    window.location.href = "home.html";
                } else {
                    // লগইন না থাকলে লগইন পেজে যাবে
                    window.location.href = "login.html";
                }
            });
        }, 3000); // ৩০০০ মিলি-সেকেন্ড = ৩ সেকেন্ড
    </script>
</body>
</html>
