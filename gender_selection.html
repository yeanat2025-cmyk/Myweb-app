<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gender Selection</title>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Custom Firebase -->
    <script src="firebase.js"></script>

    <style>
        * { box-sizing: border-box; transition: 0.3s ease; }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 25px;
        }

        .header { margin-top: 20px; }
        .about-text {
            color: #00bcd4;
            font-size: 18px;
            font-weight: 600;
            border-left: 4px solid #00bcd4;
            padding-left: 10px;
        }
        .iam-text {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            margin-top: 5px;
        }

        .selection-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }

        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .option.active {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
        }

        .male-row { justify-content: flex-start; }
        .female-row { justify-content: flex-end; }

        .avatar { width: 150px; }

        .bubble {
            padding: 12px 35px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
        }

        .active.male-row .bubble {
            background-color: #2196F3;
            color: white;
        }

        .active.female-row .bubble {
            background-color: #ff4081;
            color: white;
        }

        .next-btn {
            background-color: #00d3ed;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="about-text">About you</div>
    <h1 class="iam-text">I am</h1>
</div>

<div class="selection-container">
    <div class="option male-row" id="male-opt" onclick="selectGender('male')">
        <img src="assets/male_avatar.png" class="avatar">
        <div class="bubble">Male</div>
    </div>

    <div class="option female-row active" id="female-opt" onclick="selectGender('female')">
        <div class="bubble">Female</div>
        <img src="assets/female_avatar.png" class="avatar">
    </div>
</div>

<button class="next-btn" id="nextBtn" onclick="saveGender()">NEXT</button>

<script>

let currentGender = "female";

// 🔐 login check (important)
auth.onAuthStateChanged((user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});

function selectGender(gender) {
    currentGender = gender;

    document.getElementById('male-opt').classList.remove('active');
    document.getElementById('female-opt').classList.remove('active');

    if (gender === 'male') {
        document.getElementById('male-opt').classList.add('active');
    } else {
        document.getElementById('female-opt').classList.add('active');
    }
}

function saveGender() {
    const user = auth.currentUser;
    const btn = document.getElementById('nextBtn');

    if (!user) {
        alert("Login required!");
        return;
    }

    btn.innerText = "Saving...";
    btn.disabled = true;

    db.collection("users").doc(user.uid).set({
        gender: currentGender
    }, { merge: true })
    .then(() => {
        window.location.href = "basic_info.html";
    })
    .catch(err => {
        alert(err.message);
        btn.innerText = "NEXT";
        btn.disabled = false;
    });
}

</script>

</body>
</html>
