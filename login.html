<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Custom Firebase -->
    <script src="firebase.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .signin-btn {
            width: 100%;
            padding: 14px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .error-msg {
            color: red;
            font-size: 13px;
            display: none;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Sign in</h2>

    <div id="error-box" class="error-msg"></div>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="signin-btn" id="loginBtn">SIGN IN</button>
    </form>

    <br>

    <button onclick="googleLogin()">Login with Google</button>
    <br><br>
    <button onclick="createNewAccount()">Create Account</button>
</div>

<script>

    // Success handler
    function handleLoginSuccess(user) {
        db.collection("users").doc(user.uid).get()
        .then((doc) => {
            if (doc.exists && doc.data().nickname) {
                window.location.href = "home.html";
            } else {
                window.location.href = "gender.html";
            }
        })
        .catch(() => {
            window.location.href = "gender.html";
        });
    }

    // Redirect result (Google)
    auth.getRedirectResult().then((result) => {
        if (result.user) handleLoginSuccess(result.user);
    });

    // Email login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const email = email.value;
        const pass = password.value;
        const btn = document.getElementById('loginBtn');

        btn.disabled = true;
        btn.innerText = "Checking...";

        auth.signInWithEmailAndPassword(email, pass)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => {
            showError(err.message);
            btn.disabled = false;
            btn.innerText = "SIGN IN";
        });
    });

    // Google login
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.signInWithPopup(provider)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => {
            if (err.code === 'auth/popup-blocked') {
                auth.signInWithRedirect(provider);
            } else {
                showError(err.message);
            }
        });
    }

    // Create account
    function createNewAccount() {
        const email = email.value;
        const pass = password.value;

        if (!email || !pass) {
            alert("Email/Password required!");
            return;
        }

        auth.createUserWithEmailAndPassword(email, pass)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => showError(err.message));
    }

    function showError(msg) {
        const box = document.getElementById('error-box');
        box.innerText = msg;
        box.style.display = "block";
    }

</script>

</body>
</html>
