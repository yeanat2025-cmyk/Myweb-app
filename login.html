<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Your Firebase Config -->
    <script src="firebase.js"></script>

    <style>
        /* Reset & base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a58ca, #00d4ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card */
        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 25px;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 14px 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #0a58ca;
            box-shadow: 0 0 5px rgba(10,88,202,0.3);
        }

        /* Buttons */
        .signin-btn, .google-btn, .create-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .signin-btn {
            background: #0a58ca;
            color: white;
        }
        .signin-btn:hover { background: #074bb0; }

        .google-btn {
            background: #db4437;
            color: white;
        }
        .google-btn:hover { background: #c33d2e; }

        .create-btn {
            background: #00bcd4;
            color: white;
        }
        .create-btn:hover { background: #00a6b8; }

        /* Error Box */
        .error-msg {
            color: #ff4757;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        /* Small links */
        .small-text {
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Sign In</h2>

    <div id="error-box" class="error-msg"></div>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="signin-btn" id="loginBtn">SIGN IN</button>
    </form>

    <button class="google-btn" onclick="googleLogin()">Login with Google</button>
    <button class="create-btn" onclick="createNewAccount()">Create Account</button>

    <p class="small-text">Forgot password? Contact support.</p>
</div>

<script>
    // Firestore + Auth
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Email login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const btn = document.getElementById('loginBtn');
        const email = emailInput.value;
        const password = passInput.value;

        btn.disabled = true;
        btn.innerText = "Checking...";

        auth.signInWithEmailAndPassword(email, password)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => {
            showError(err.message);
            btn.disabled = false;
            btn.innerText = "SIGN IN";
        });
    });

    // Google login
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => {
            if(err.code === 'auth/popup-blocked') {
                auth.signInWithRedirect(provider);
            } else {
                showError(err.message);
            }
        });
    }

    // Create new account
    function createNewAccount() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if(!email || !password) { alert("Email & Password required!"); return; }

        auth.createUserWithEmailAndPassword(email, password)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => showError(err.message));
    }

    // Login success
    function handleLoginSuccess(user) {
        db.collection("users").doc(user.uid).get()
        .then(doc => {
            if(doc.exists && doc.data().nickname) {
                window.location.href = "home.html";
            } else {
                window.location.href = "gender.html";
            }
        })
        .catch(() => { window.location.href = "gender.html"; });
    }

    // Show error
    function showError(msg) {
        const box = document.getElementById('error-box');
        box.innerText = msg;
        box.style.display = "block";
    }

</script>

</body>
</html>
