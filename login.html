<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - My App</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<!-- Custom Firebase Config -->
<script src="firebase.js"></script>

<!-- Styles -->
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0a58ca, #00d4ff);
        min-height: 100vh;
        display: flex; justify-content: center; align-items: center;
    }
    .login-card {
        background: white;
        width: 90%;
        max-width: 400px;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        text-align: center;
    }
    .login-card h2 {
        margin-bottom: 20px; color: #0a58ca;
    }
    input {
        width: 100%;
        padding: 12px 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
    }
    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }
    #emailLoginBtn {
        background: #1a73e8;
        color: white;
    }
    #googleLoginBtn {
        background: #db4437;
        color: white;
    }
    #createAccountBtn {
        background: #00c853;
        color: white;
    }
    .error-box {
        color: #ff4757;
        font-size: 14px;
        margin-bottom: 10px;
        display: none;
    }
</style>
</head>

<body>

<div class="login-card">
    <h2>Sign In</h2>

    <div id="error-box" class="error-box"></div>

    <!-- Email Login Form -->
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="emailLoginBtn">Sign In</button>
    </form>

    <!-- Google Login -->
    <button id="googleLoginBtn">Sign in with Google</button>

    <!-- Create Account -->
    <button id="createAccountBtn">Create New Account</button>
</div>

<script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Utility: Show error messages
    function showError(msg) {
        const box = document.getElementById('error-box');
        box.innerText = msg;
        box.style.display = "block";
    }

    function handleLoginSuccess(user) {
        db.collection("users").doc(user.uid).get()
        .then(doc => {
            if(doc.exists && doc.data().nickname) {
                window.location.href = "home.html";
            } else {
                window.location.href = "gender.html";
            }
        }).catch(() => {
            window.location.href = "gender.html";
        });
    }

    // Check redirect result (for Google login in WebView)
    auth.getRedirectResult().then(result => {
        if(result.user) handleLoginSuccess(result.user);
    }).catch(err => showError(err.message));

    // Email login
    document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('emailLoginBtn');
        btn.disabled = true; btn.innerText = "Checking...";
        
        auth.signInWithEmailAndPassword(email, pass)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => {
            showError(err.message);
            btn.disabled = false;
            btn.innerText = "Sign In";
        });
    });

    // Google login
    document.getElementById('googleLoginBtn').addEventListener('click', () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider); // Use redirect for WebView
    });

    // Create new account
    document.getElementById('createAccountBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) { alert("Email & password required!"); return; }
        
        auth.createUserWithEmailAndPassword(email, pass)
        .then(res => handleLoginSuccess(res.user))
        .catch(err => showError(err.message));
    });
</script>

</body>
</html>
