<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white; width: 90%; max-width: 400px;
            padding: 40px 30px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
        }

        .logo-container img { width: 65px; height: 65px; margin-bottom: 15px; }

        h2 { margin: 0; font-size: 24px; color: #202124; font-weight: 500; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        input {
            width: 100%; padding: 12px 5px;
            border: none; border-bottom: 1px solid #ddd;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom: 2px solid #1a73e8; }

        .signin-btn {
            width: 100%; padding: 14px;
            background-color: #1a73e8; color: white;
            border: none; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 10px;
        }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #aaa; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }

        .social-btn {
            width: 100%; padding: 10px;
            background: white; border: 1px solid #ddd;
            border-radius: 6px; margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 14px; color: #555;
        }
        .social-btn img { width: 18px; margin-right: 10px; }

        .error-msg { color: #d93025; font-size: 13px; margin-bottom: 15px; display: none; }
        .footer-link { color: #1a73e8; text-decoration: none; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <h2>Sign in</h2>
        <p>to continue to your account</p>

        <div id="error-box" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="signin-btn" id="loginBtn">SIGN IN</button>
        </form>

        <div class="divider">or</div>

        <div class="social-btn" onclick="googleLogin()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
            Continue with Google
        </div>

        <div style="margin-top: 25px; font-size: 14px;">
            Don't have an account? <span class="footer-link" onclick="createNewAccount()">Create account</span>
        </div>
    </div>

    <script>
        // ১. আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCzv08ydHYvUue_sgEjDoT221ocAedXYfM",
            authDomain: "myproject-9f21b.firebaseapp.com",
            projectId: "myproject-9f21b",
            storageBucket: "myproject-9f21b.firebasestorage.app",
            messagingSenderId: "670760388595",
            appId: "1:670760388595:web:a88159aa1ef33a4da37486"
        };

        // ২. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ৩. লগইন সাকসেস হ্যান্ডলার (আপনার চাওয়া লজিক)
        function handleLoginSuccess(user) {
            db.collection("users").doc(user.uid).get().then((doc) => {
                if (doc.exists && doc.data().nickname) {
                    // তথ্য থাকলে সরাসরি হোমে
                    window.location.href = "home.html";
                } else {
                    // তথ্য না থাকলে বেসিক ইনফো পেজে
                    window.location.href = "gender_selection.html";
                }
            }).catch((error) => {
                console.error("Firestore Error:", error);
                window.location.href = "gender_selection.html";
            });
        }

        // ৪. ইমেইল লগইন
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "Checking...";

            auth.signInWithEmailAndPassword(email, pass)
                .then((res) => handleLoginSuccess(res.user))
                .catch(err => {
                    showError(err.message);
                    btn.disabled = false;
                    btn.innerText = "SIGN IN";
                });
        });

        // ৫. গুগল লগইন
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((res) => handleLoginSuccess(res.user))
                .catch(err => showError(err.message));
        }

        // ৬. নতুন অ্যাকাউন্ট খোলা (টেস্টের জন্য)
        function createNewAccount() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) { alert("Enter email/pass first!"); return; }

            auth.createUserWithEmailAndPassword(email, pass)
                .then((res) => handleLoginSuccess(res.user))
                .catch(err => showError(err.message));
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.innerText = msg;
            box.style.display = "block";
        }
    </script>
</body>
</html>
