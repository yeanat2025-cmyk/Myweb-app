<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Info</title>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Custom Firebase -->
    <script src="firebase.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding: 25px;
        }
        .input-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: #f1f3f4;
        }
        .next-btn {
            width: 100%;
            padding: 16px;
            background: #00d3ed;
            color: white;
            border: none;
            border-radius: 40px;
        }
        .dob-select {
            width: 30%;
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>Basic Info</h2>

<input type="text" id="nickname" class="input-box" placeholder="Nickname">

<select id="region" class="input-box">
    <option value="Bangladesh">Bangladesh</option>
    <option value="India">India</option>
</select>

<div>
    <select id="day" class="dob-select"></select>
    <select id="month" class="dob-select"></select>
    <select id="year" class="dob-select"></select>
</div>

<br>
<button class="next-btn" onclick="saveData()">NEXT</button>

<script>

// 🔐 Login check
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
    }
});

// DOB setup
window.onload = () => {
    const d = day, m = month, y = year;

    for(let i=1; i<=31; i++) d.add(new Option(i, i));
    for(let i=1; i<=12; i++) m.add(new Option(i, i));

    let currentYear = new Date().getFullYear();
    for(let i=currentYear; i>=1970; i--) y.add(new Option(i, i));

    d.value = 1;
    m.value = 1;
    y.value = 2000;
};

// Save data
function saveData() {
    const user = auth.currentUser;

    const nick = nickname.value.trim();
    const country = region.value;

    const dob = day.value + "/" + month.value + "/" + year.value;

    if (!user) return alert("Login expired!");
    if (!nick) return alert("Enter nickname");

    db.collection("users").doc(user.uid).set({
        nickname: nick,
        region: country,
        birthday: dob,
        setup_step: 1
    }, { merge: true })
    .then(() => {
        window.location.href = "password.html";
    })
    .catch(err => alert(err.message));
}

</script>

</body>
</html>
