<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set UID</title>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Custom Firebase -->
    <script src="firebase.js"></script>

    <style>
        body {
            font-family: 'Segoe UI';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            width: 300px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

    <h3>Your UID</h3>
    <h1 id="uidText">------</h1>

    <input type="password" id="pass" placeholder="Password">
    <input type="password" id="confirm_pass" placeholder="Confirm Password">

    <div id="error-msg" style="color:red;"></div>

    <button onclick="saveData()">Continue</button>

</div>

<script>

let generatedUID = "";

// 🔐 login check
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
    }
});

// 🎯 UID generate
window.onload = () => {
    generatedUID = Math.floor(100000 + Math.random() * 900000);
    document.getElementById("uidText").innerText = generatedUID;
};

// 💾 Save UID only (NOT password)
function saveData() {
    const pass = passInput();
    const cpass = confirmInput();
    const user = auth.currentUser;

    if (pass.length < 4) return showErr("Password too short");
    if (pass !== cpass) return showErr("Password mismatch");

    db.collection("users").doc(user.uid).set({
        uid_number: generatedUID,
        is_active: true
    }, { merge: true })
    .then(() => {
        window.location.href = "home.html";
    })
    .catch(err => showErr(err.message));
}

// helpers
function passInput() {
    return document.getElementById("pass").value;
}
function confirmInput() {
    return document.getElementById("confirm_pass").value;
}

function showErr(msg) {
    document.getElementById("error-msg").innerText = msg;
}

</script>

</body>
</html>
