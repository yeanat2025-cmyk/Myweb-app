<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - Auto UID</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%; max-width: 380px;
            text-align: center; display: flex; flex-direction: column; gap: 20px;
        }

        .flag-icon { width: 70px; margin: 0 auto 10px; }

        /* Glow Input Group */
        .input-group {
            width: 100%; background: #fff; border-radius: 12px;
            padding: 15px; font-size: 18px; font-weight: 600;
            box-shadow: 0 0 15px rgba(172, 255, 172, 0.4), 0 0 15px rgba(220, 180, 255, 0.4);
            display: flex; justify-content: center; align-items: center;
        }

        .uid-label { color: #a349a4; margin-right: 5px; }
        .uid-val { color: #e67e22; }

        input {
            width: 100%; border: none; outline: none;
            text-align: center; font-size: 18px; font-weight: 600;
            background: transparent; color: #333;
        }

        .submit-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(to right, #2b6dfd, #00d4ff);
            color: white; border: none; border-radius: 50px;
            font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(43, 109, 253, 0.3);
            margin-top: 10px;
        }

        #error-msg { color: #ff4757; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Flag_of_Bangladesh.svg" alt="BD" class="flag-icon">

        <div class="input-group">
            <span class="uid-label">Uid</span>-<span id="display-uid" class="uid-val">Generating...</span>
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
        </div>

        <div class="input-group">
            <input type="password" id="confirm_pass" placeholder="Confirme password">
        </div>

        <div id="error-msg"></div>

        <button class="submit-btn" onclick="savePassword()">Submit</button>
    </div>

    <script>
        // ১. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCzv08ydHYvUue_sgEjDoT221ocAedXYfM",
            authDomain: "myproject-9f21b.firebaseapp.com",
            projectId: "myproject-9f21b",
            storageBucket: "myproject-9f21b.firebasestorage.app",
            messagingSenderId: "670760388595",
            appId: "1:670760388595:web:a88159aa1ef33a4da37486"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let generatedUID = "";

        // ২. অটো UID তৈরির ফাংশন (৬ ডিজিটের নম্বর)
        window.onload = function() {
            generatedUID = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('display-uid').innerText = generatedUID;
        };

        // ৩. পাসওয়ার্ড সেভ করার ফাংশন
        function savePassword() {
            const pass = document.getElementById('pass').value;
            const cPass = document.getElementById('confirm_pass').value;
            const errorBox = document.getElementById('error-msg');
            const user = auth.currentUser;

            if (pass.length < 4) {
                showErr("Password too short!"); return;
            }
            if (pass !== cPass) {
                showErr("Passwords do not match!"); return;
            }

            if (user) {
                db.collection("users").doc(user.uid).update({
                    uid_number: generatedUID,
                    password: pass,
                    is_active: true
                }).then(() => {
                    window.location.href = "home.html";
                }).catch(err => showErr(err.message));
            } else {
                showErr("User not found! Please login again.");
            }
        }

        function showErr(msg) {
            const eb = document.getElementById('error-msg');
            eb.innerText = msg; eb.style.display = "block";
        }
    </script>
</body>
</html>
